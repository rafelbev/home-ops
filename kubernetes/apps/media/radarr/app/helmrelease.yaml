apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: radarr-1614541747
spec:
  interval: 30m
  timeZone: "Europe/Malta"
  releaseName: radarr-1614541747
  chart:
    spec:
      chart: radarr
      sourceRef:
        kind: HelmRepository
        name: linuxserver-charts 
  values:
    image:
      repository: linuxserver/radarr
      tag: 6.0.4
    env:
      containerExtraEnv:
        - name: PGID
          value: "0"
        - name: PUID
          value: "0"
        - name: TZ
          value: Europe/Malta
    persistence:
      config:
        enabled: true
        type: pvc
        existingClaim: radarr-1614541747-config
      media:
        enabled: true
        type: pvc
        existingClaim: media-pvc-v2
    nodeSelector:
      kubernetes.io/hostname: k3os-9153
    livenessProbe:
      httpGet:
        path: /api/v3/system/status
        port: 7878
    readinessProbe:
      httpGet:
        path: /api/v3/system/status
        port: 7878
